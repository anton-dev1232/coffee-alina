<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Полина, выпьем кофе? ☕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --cream:    #fdf6ec;
      --foam:     #f5ebe0;
      --latte:    #c8956c;
      --caramel:  #d4824a;
      --mocha:    #7b4b2a;
      --espresso: #2e1503;
      --yes:      #c8956c;
      --yes-h:    #7b4b2a;
      --green:    #5a9b6e;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--espresso);
      overflow-x: hidden;
    }

    /* ── Background decoration ───────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 60%, rgba(200,149,108,.13) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 25%, rgba(123,75,42,.09) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating beans background ───────────────────────── */
    .beans {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bean {
      position: absolute;
      width: 18px;
      height: 26px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: rgba(123,75,42,.07);
      animation: drift linear infinite;
    }
    .bean::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 60%;
      background: rgba(123,75,42,.15);
      border-radius: 2px;
    }
    @keyframes drift {
      from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ── Sections ────────────────────────────────────────── */
    section {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    #form-section { background: var(--foam); }

    /* ── Cards ───────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 56px 52px;
      max-width: 540px;
      width: 100%;
      box-shadow:
        0 2px 4px rgba(61,31,13,.04),
        0 8px 24px rgba(61,31,13,.08),
        0 32px 64px rgba(61,31,13,.10);
      text-align: center;
    }

    /* ── Cup icon ────────────────────────────────────────── */
    .cup-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }
    .cup-emoji {
      font-size: 72px;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(200,149,108,.3));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-10px) rotate(3deg); }
    }
    .steam {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    .steam span {
      width: 3px;
      height: 20px;
      background: linear-gradient(to top, rgba(200,149,108,.5), transparent);
      border-radius: 2px;
      animation: steam-rise 2s ease-in-out infinite;
    }
    .steam span:nth-child(2) { animation-delay: .4s; height: 26px; }
    .steam span:nth-child(3) { animation-delay: .8s; }
    @keyframes steam-rise {
      0%   { opacity: 0; transform: translateY(0) scaleX(1); }
      40%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-24px) scaleX(1.5); }
    }

    /* ── Typography ─────────────────────────────────────── */
    .invite-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.25;
      color: var(--espresso);
      margin-bottom: 40px;
    }
    /* ── Buttons area ────────────────────────────────────── */
    #btn-area {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      min-height: 56px;
    }

    .btn {
      padding: 14px 38px;
      border-radius: 50px;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background .25s, transform .2s, box-shadow .25s, opacity .3s;
      white-space: nowrap;
    }

    #btn-yes {
      background: var(--yes);
      color: #fff;
      box-shadow: 0 4px 18px rgba(200,149,108,.45);
    }
    #btn-yes:hover {
      background: var(--yes-h);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(123,75,42,.45);
    }
    #btn-yes:active { transform: translateY(0); }
    #btn-yes.accepted {
      background: var(--green);
      box-shadow: 0 4px 18px rgba(90,155,110,.45);
      pointer-events: none;
    }

    #btn-no {
      background: transparent;
      color: var(--mocha);
      border: 2px solid var(--latte);
      transition: left .12s ease, top .12s ease, opacity .3s, background .25s, color .25s;
    }
    #btn-no:hover {
      background: var(--foam);
    }
    #btn-no.fixed-mode {
      position: fixed;
      z-index: 9999;
      transition: left .12s ease, top .12s ease;
    }
    #btn-no.faded { opacity: 0; pointer-events: none; }

    /* ── Scroll hint ─────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--mocha);
      opacity: .35;
      font-size: .78rem;
      letter-spacing: .05em;
      animation: bounce-hint 2.5s ease-in-out infinite;
      pointer-events: none;
    }
    .scroll-hint::after {
      content: '↓';
      font-size: 1.1rem;
    }
    @keyframes bounce-hint {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(6px); }
    }

    /* ── Form card ───────────────────────────────────────── */
    .form-card {
      background: #fff;
      border-radius: 28px;
      padding: 56px 52px;
      max-width: 540px;
      width: 100%;
      box-shadow:
        0 2px 4px rgba(61,31,13,.04),
        0 8px 24px rgba(61,31,13,.08),
        0 32px 64px rgba(61,31,13,.10);
    }

    .form-card.locked {
      opacity: .45;
      pointer-events: none;
      filter: saturate(.3);
    }
    .form-card.locked .form-lock-hint {
      display: block;
    }

    .form-lock-hint {
      display: none;
      text-align: center;
      font-size: .85rem;
      color: var(--mocha);
      font-style: italic;
      margin-top: 20px;
      opacity: .7;
    }

    .form-header {
      margin-bottom: 32px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--espresso);
      margin-bottom: 8px;
    }
    .form-sub {
      font-size: .9rem;
      color: var(--mocha);
      opacity: .65;
      font-style: italic;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }

    label {
      font-size: .73rem;
      font-weight: 500;
      color: var(--mocha);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    input[type="date"],
    input[type="time"],
    input[type="text"] {
      width: 100%;
      min-width: 0;
      padding: 13px 16px;
      border: 2px solid #ede8e3;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
      color: var(--espresso);
      background: var(--cream);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input::placeholder { color: rgba(123,75,42,.4); }
    input:focus {
      border-color: var(--latte);
      box-shadow: 0 0 0 3px rgba(200,149,108,.15);
    }

    .place-group { margin-bottom: 28px; }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--yes);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 500;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(200,149,108,.4);
      transition: background .25s, transform .2s, box-shadow .25s;
    }
    .btn-submit:hover {
      background: var(--yes-h);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(123,75,42,.4);
    }
    .btn-submit:active { transform: translateY(0); }

    /* ── Thank-you state ─────────────────────────────────── */
    #thanks {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
    }
    #thanks.visible { display: flex; }

    .thanks-icon {
      font-size: 80px;
      animation: pop .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);  opacity: 1; }
    }

    .thanks-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--espresso);
    }
    .thanks-card {
      background: var(--cream);
      border: 2px solid #ede8e3;
      border-radius: 18px;
      padding: 24px 32px;
      font-size: .97rem;
      line-height: 2;
      color: var(--mocha);
      width: 100%;
    }
    .thanks-card strong { color: var(--espresso); }
    .thanks-note {
      font-size: .82rem;
      color: var(--mocha);
      opacity: .5;
      font-style: italic;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .card, .form-card { padding: 36px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 420px) {
      #btn-area {
        flex-direction: column;
        align-items: stretch;
      }
      #btn-yes, #btn-no {
        width: 100%;
        text-align: center;
        padding: 14px 20px;
      }
    }
  </style>
</head>
<body>

<!-- Floating coffee beans -->
<div class="beans" id="beans"></div>

<!-- ═══════════════════════════════════════════
     Section 1 — Invitation
════════════════════════════════════════════ -->
<section id="invite-section">
  <div class="card">
    <div class="cup-wrap">
      <div class="steam">
        <span></span><span></span><span></span>
      </div>
      <span class="cup-emoji">☕</span>
    </div>

    <h1 class="invite-title">Полина,<br>пойдём выпьем кофе?</h1>

    <div id="btn-area">
      <button class="btn" id="btn-yes" onclick="onYes()">Да, конечно! ☕</button>
      <button class="btn" id="btn-no">Нет</button>
    </div>
  </div>

  <div class="scroll-hint">листай ниже</div>
</section>

<!-- ═══════════════════════════════════════════
     Section 2 — Form
════════════════════════════════════════════ -->
<section id="form-section">
  <div style="max-width:540px;width:100%">

    <!-- Form card (locked until Yes) -->
    <div class="form-card locked" id="form-card">
      <div class="form-header">
        <h2 class="form-title">Когда встретимся? 🗓</h2>
        <p class="form-sub">Выбери дату, время и место — я буду ждать</p>
      </div>

      <form id="coffee-form" onsubmit="onSubmit(event)" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="input-date">Дата</label>
            <input type="date" id="input-date" name="date" required />
          </div>
          <div class="form-group">
            <label for="input-time">Время</label>
            <input type="time" id="input-time" name="time" required />
          </div>
        </div>
        <div class="form-group place-group">
          <label for="input-place">Место <span style="opacity:.5;font-weight:400;text-transform:none">(по желанию)</span></label>
          <input type="text" id="input-place" name="place" placeholder="Любимая кофейня, адрес..." />
        </div>
        <button type="submit" class="btn-submit">Назначить встречу ✨</button>
      </form>

      <p class="form-lock-hint">☝️ Сначала нажми «Да» выше</p>
    </div>

    <!-- Thank-you (hidden until submit) -->
    <div id="thanks">
      <div class="thanks-icon">🎉</div>
      <h2 class="thanks-title">Отлично, жду тебя!</h2>
      <div class="thanks-card" id="thanks-details"></div>
      <p class="thanks-note">Увидимся скоро ☕</p>
    </div>

  </div>
</section>

<!-- ═══════════════════════════════════════════
     ⚙️  НАСТРОЙКА УВЕДОМЛЕНИЙ
     Замени значения ниже своими данными.
     Инструкция — в README.md
════════════════════════════════════════════ -->
<script>
  /* ──────────────────────────────────────────────
     TELEGRAM НАСТРОЙКИ
     TG_TOKEN  — токен бота от @BotFather
     TG_CHAT   — ваш chat_id (см. инструкцию)
  ────────────────────────────────────────────── */
  const TG_TOKEN = '8778337128:AAGSoODfDasVMV1i87jUf36P9fJHprCy3lc';   // пример: 7123456789:AAFxxxxxx
  const TG_CHAT  = '1160362290';      // пример: 123456789

  /* ──────────────────────────────────────────── */

  /* --- Floating beans --- */
  const beansEl = document.getElementById('beans');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bean';
    b.style.cssText = [
      `left:${Math.random() * 100}%`,
      `animation-duration:${12 + Math.random() * 18}s`,
      `animation-delay:${-Math.random() * 30}s`,
      `transform:rotate(${Math.random() * 360}deg)`,
      `opacity:${.4 + Math.random() * .6}`,
    ].join(';');
    beansEl.appendChild(b);
  }

  /* --- No button escape --- */
  const btnNo  = document.getElementById('btn-no');
  const btnYes = document.getElementById('btn-yes');
  let noFixed  = false;

  function escapeNo() {
    if (!noFixed) {
      const r = btnNo.getBoundingClientRect();
      btnNo.style.left   = r.left + 'px';
      btnNo.style.top    = r.top  + 'px';
      btnNo.style.width  = r.width  + 'px';
      btnNo.style.height = r.height + 'px';
      btnNo.classList.add('fixed-mode');
      noFixed = true;
    }
    const pad = 20;
    const maxX = window.innerWidth  - btnNo.offsetWidth  - pad;
    const maxY = window.innerHeight - btnNo.offsetHeight - pad;
    btnNo.style.left = (pad + Math.random() * (maxX - pad)) + 'px';
    btnNo.style.top  = (pad + Math.random() * (maxY - pad)) + 'px';
  }

  btnNo.addEventListener('mouseenter', escapeNo);
  btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); escapeNo(); });

  /* Hide "No" when invite section scrolls out of view */
  window.addEventListener('scroll', () => {
    if (yesClicked || !noFixed) return;
    const inviteBottom = document.getElementById('invite-section').getBoundingClientRect().bottom;
    btnNo.classList.toggle('faded', inviteBottom < 0);
  }, { passive: true });

  /* --- Yes clicked --- */
  let yesClicked = false;

  function onYes() {
    if (yesClicked) return;
    yesClicked = true;

    btnYes.textContent = 'Отлично! ☕';
    btnYes.classList.add('accepted');
    btnNo.classList.add('faded');

    document.getElementById('form-card').classList.remove('locked');

    setTimeout(() => {
      document.getElementById('form-section').scrollIntoView({ behavior: 'smooth' });
    }, 500);
  }

  /* --- Form submit --- */
  async function onSubmit(e) {
    e.preventDefault();

    const date  = document.getElementById('input-date').value;
    const time  = document.getElementById('input-time').value;
    const place = document.getElementById('input-place').value.trim();

    if (!date || !time) {
      document.getElementById('input-date').focus();
      return;
    }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = 'Отправляем...';
    btn.disabled = true;

    /* Format for display */
    const dateObj  = new Date(date + 'T' + time);
    const dateHuman = dateObj.toLocaleDateString('ru-RU', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    const now        = new Date();
    const submittedAt = now.toLocaleString('ru-RU');

    /* Send to Telegram */
    const lines = [
      '☕ <b>Новая запись на кофе с Полиной!</b>',
      '',
      `📅 <b>Дата:</b> ${dateHuman}`,
      `🕐 <b>Время:</b> ${time}`,
      place ? `📍 <b>Место:</b> ${place}` : '',
      '',
      `<i>Записано: ${submittedAt}</i>`,
    ].filter(l => l !== undefined);

    try {
      await fetch(
        `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id:    TG_CHAT,
            text:       lines.join('\n'),
            parse_mode: 'HTML',
          }),
        }
      );
    } catch (_) {
      /* уведомление не отправилось, но форму показываем */
    }

    /* Show thank-you */
    document.getElementById('form-card').style.display = 'none';
    const thanks  = document.getElementById('thanks');
    const details = document.getElementById('thanks-details');

    details.innerHTML = `
      📅 <strong>${dateHuman}</strong><br>
      🕐 <strong>${time}</strong>
      ${place ? `<br>📍 <strong>${place}</strong>` : ''}
      <br><br>
      <span style="font-size:.8rem;opacity:.55">Записано ${submittedAt}</span>
    `;

    thanks.classList.add('visible');
  }
</script>
</body>
</html>
