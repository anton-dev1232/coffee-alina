<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Алина, привет! 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-from:   #f9eff4;
            --bg-to:     #ede0f0;
            --rose:      #c2748a;
            --rose-dark: #9a4f63;
            --rose-deep: #7a3350;
            --text:      #5a2d3e;
            --muted:     #a07080;
            --border:    rgba(194,116,138,.25);
            --card-bg:   rgba(255,255,255,.88);
        }

        body {
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(150deg, var(--bg-from) 0%, #f5e8f0 50%, var(--bg-to) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: var(--text);
        }

        /* === PETALS === */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: fall linear forwards;
            will-change: transform;
        }
        @keyframes fall {
            0%   { transform: translateY(-60px) rotate(0deg); opacity: .8; }
            80%  { opacity: .5; }
            100% { transform: translateY(105vh) rotate(500deg); opacity: 0; }
        }

        /* === CURSOR SPARKLE === */
        .cursor-spark {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            font-size: .9rem;
            animation: sparkFly .75s ease-out forwards;
        }
        @keyframes sparkFly {
            0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
            60%  { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--dx)), calc(-50% - 45px)) scale(1.1); opacity: 0; }
        }

        /* === HEART BURST === */
        .heart-burst {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.3rem;
            animation: heartFly 1.1s ease-out forwards;
        }
        @keyframes heartFly {
            0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
            50%  { opacity: 1; }
            100% { transform: translate(var(--dx),var(--dy)) scale(1) rotate(var(--dr)); opacity: 0; }
        }

        /* === CONFETTI === */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* === LAYOUT === */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 16px 80px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 44px 30px 36px;
            max-width: 460px;
            width: 100%;
            box-shadow:
                0 8px 40px rgba(122,51,80,.12),
                0 1px 4px rgba(122,51,80,.07),
                inset 0 1px 0 rgba(255,255,255,.9);
            position: relative;
        }

        .card-flowers {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            letter-spacing: 4px;
            white-space: nowrap;
            filter: drop-shadow(0 2px 6px rgba(194,116,138,.35));
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.95rem;
            color: var(--rose-deep);
            text-align: center;
            margin-top: 10px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: .93rem;
            margin-bottom: 26px;
            font-style: italic;
        }

        .question {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text);
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.55;
        }

        /* === OPTION BUTTONS === */
        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 11px;
            border: none;
            border-radius: 14px;
            padding: 13px 17px;
            font-family: 'Nunito', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            text-align: left;
            background: linear-gradient(135deg, var(--rose), var(--rose-dark));
            box-shadow: 0 3px 14px rgba(154,79,99,.3);
            transition: transform .2s, box-shadow .2s, filter .2s;
            position: relative;
            overflow: hidden;
        }
        .option-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background .2s;
        }
        .option-btn:hover::after { background: rgba(255,255,255,.1); }
        .option-btn:hover  { transform: translateY(-2px) scale(1.01); box-shadow: 0 6px 22px rgba(154,79,99,.42); }
        .option-btn:active { transform: scale(.98); }

        /* subtle shade variation per button */
        .opt-2 { filter: brightness(.96); }
        .opt-3 { filter: brightness(.92); }
        .opt-4 { filter: brightness(.88); }
        .opt-5 { filter: brightness(.84); }
        .opt-6 {
            background: linear-gradient(135deg, #a89098, #7a6570);
            box-shadow: 0 3px 14px rgba(122,101,112,.25);
            font-size: .88rem;
            filter: none;
        }

        .option-btn .ico { font-size: 1.4rem; flex-shrink: 0; }

        /* === SECTIONS === */
        .section { display: none; animation: fadeUp .42s cubic-bezier(.22,.68,0,1.2) both; }
        .section.active { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--rose-deep);
            text-align: center;
            margin-bottom: 6px;
        }
        .section-sub {
            text-align: center;
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 20px;
        }

        /* === TIME SECTION === */
        .time-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .time-preset {
            background: rgba(194,116,138,.1);
            border: 1.5px solid var(--border);
            color: var(--rose-dark);
            border-radius: 9px;
            padding: 7px 13px;
            font-family: 'Nunito', sans-serif;
            font-size: .88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        .time-preset:hover,
        .time-preset.selected {
            background: var(--rose);
            border-color: var(--rose);
            color: #fff;
        }

        .time-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 1.5rem;
            text-align: center;
            color: var(--rose-deep);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            outline: none;
            background: rgba(255,255,255,.85);
            margin-bottom: 20px;
            transition: border-color .2s, box-shadow .2s;
        }
        .time-input:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 3px rgba(194,116,138,.18);
        }

        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--rose-dark), var(--rose-deep));
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 18px rgba(122,51,80,.35);
            letter-spacing: .2px;
        }
        .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(122,51,80,.48); }
        .confirm-btn:active { transform: scale(.98); }

        /* === BACK BUTTON === */
        .back-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: .85rem;
            cursor: pointer;
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            transition: color .2s;
        }
        .back-btn:hover { color: var(--rose-dark); }

        /* === SUCCESS SECTION === */
        .success-big { font-size: 3.8rem; text-align: center; margin-bottom: 14px; }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--rose-deep);
            text-align: center;
            margin-bottom: 10px;
        }
        .success-text { color: var(--muted); text-align: center; font-size: .97rem; line-height: 1.6; }
        .success-flowers {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 18px;
            animation: sway 2.5s ease-in-out infinite;
        }

        /* === DECO FLOWERS === */
        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: .18;
            animation: sway ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50%       { transform: rotate(10deg) scale(1.04); }
        }

        /* === FLEEING BUTTON === */
        .no-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: rgba(200,190,195,.45);
            color: #b09098;
            border: 1px solid rgba(200,180,190,.4);
            border-radius: 9px;
            padding: 7px 13px;
            font-size: .76rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: default;
            backdrop-filter: blur(6px);
            z-index: 2000;
            user-select: none;
            transition: left .28s cubic-bezier(.22,.68,0,1.4), top .28s cubic-bezier(.22,.68,0,1.4);
        }

        /* === MOBILE === */
        @media (max-width: 480px) {
            .card { padding: 38px 16px 28px; border-radius: 22px; }
            .card h1 { font-size: 1.6rem; }
            .question { font-size: 1.05rem; }
            .option-btn { padding: 12px 13px; font-size: .88rem; }
            .option-btn .ico { font-size: 1.25rem; }
            .time-input { font-size: 1.3rem; }
            .section-title { font-size: 1.15rem; }
            .success-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<!-- Corner decoration flowers -->
<div class="deco" style="top:4%;  left:2%;  font-size:2.2rem; animation-duration:4s">🌸</div>
<div class="deco" style="top:4%;  right:2%; font-size:2.2rem; animation-duration:5s;   animation-delay:.8s">🌷</div>
<div class="deco" style="bottom:8%; left:2%; font-size:2rem;  animation-duration:3.5s; animation-delay:1.5s">🌺</div>
<div class="deco" style="bottom:8%; right:2%; font-size:2rem; animation-duration:4.5s; animation-delay:.3s">🌸</div>
<div class="deco" style="top:42%; left:0%;  font-size:1.5rem; animation-duration:6s;   animation-delay:2s">🌼</div>
<div class="deco" style="top:42%; right:0%; font-size:1.5rem; animation-duration:5.5s; animation-delay:1s">🌼</div>
<div class="deco" style="top:20%; left:5%;  font-size:1.2rem; animation-duration:7s;   animation-delay:.5s">🪷</div>
<div class="deco" style="top:20%; right:5%; font-size:1.2rem; animation-duration:6.5s; animation-delay:2.5s">🪷</div>

<div class="container">
    <div class="card">
        <div class="card-flowers">🌸🌷🌸</div>

        <!-- ======= MAIN ======= -->
        <div id="s-main">
            <h1>Привет, Алина! 🌸</h1>
            <p class="subtitle">У меня есть идея на сегодня...</p>
            <p class="question">✨ Куда пойдём? ✨</p>

            <div class="options">
                <button class="option-btn opt-1" onclick="selectOpt('billiards','🎱 Бильярд', this)">
                    <span class="ico">🎱</span><span>Бильярд</span>
                </button>
                <button class="option-btn opt-2" onclick="selectOpt('walk','🌿 Вайбово погулять', this)">
                    <span class="ico">🌿</span><span>Вайбово погулять</span>
                </button>
                <button class="option-btn opt-3" onclick="selectOpt('bay','🌊 Посмотреть на залив под безкалорийный лимонадик', this)">
                    <span class="ico">🌊</span><span>Посмотреть на залив под безкалорийный лимонадик</span>
                </button>
                <button class="option-btn opt-4" onclick="selectOpt('cinema','🎬 Кинотеатр', this)">
                    <span class="ico">🎬</span><span>Кинотеатр</span>
                </button>
                <button class="option-btn opt-5" onclick="selectOpt('food','🍰 Сходить покушать чего-нибудь вкусненького', this)">
                    <span class="ico">🍰</span><span>Сходить покушать чего-нибудь вкусненького</span>
                </button>
                <button class="option-btn opt-6" onclick="selectTired(this)">
                    <span class="ico">😴</span><span>Я устала... (увидимся завтра в 10:00 и в 20:00)</span>
                </button>
            </div>
        </div>

        <!-- ======= TIME PICKER ======= -->
        <div id="s-time" class="section">
            <div class="section-title">Во сколько? 🕐</div>
            <div class="section-sub" id="time-choice"></div>

            <div class="time-presets">
                <button class="time-preset" onclick="pickPreset('15:00',this)">15:00</button>
                <button class="time-preset" onclick="pickPreset('16:00',this)">16:00</button>
                <button class="time-preset" onclick="pickPreset('17:00',this)">17:00</button>
                <button class="time-preset" onclick="pickPreset('18:00',this)">18:00</button>
                <button class="time-preset" onclick="pickPreset('19:00',this)">19:00</button>
                <button class="time-preset" onclick="pickPreset('20:00',this)">20:00</button>
                <button class="time-preset" onclick="pickPreset('21:00',this)">21:00</button>
            </div>

            <input type="time" class="time-input" id="time-input" value="18:00">

            <button class="confirm-btn" onclick="confirmTime()">Готово! ✨</button>
            <button class="back-btn" onclick="goBack()">← Назад</button>
        </div>

        <!-- ======= SUCCESS ======= -->
        <div id="s-success" class="section">
            <div class="success-big">🎉</div>
            <div class="success-title">Ура! Договорились! 🌸</div>
            <p class="success-text" id="success-msg"></p>
            <div class="success-flowers">🌸🌷🌺🌷🌸</div>
        </div>
    </div>
</div>

<!-- Fleeing button -->
<button class="no-btn" id="no-btn" onmouseenter="flee()" ontouchstart="flee()">
    не видимся
</button>

<script>
    const BOT_TOKEN = '8778337128:AAGSoODfDasVMV1i87jUf36P9fJHprCy3lc';
    const CHAT_ID   = '1160362290';

    let chosenKey   = '';
    let chosenLabel = '';

    /* ── sections ── */
    function show(id) {
        ['s-main','s-time','s-success'].forEach(s => {
            const el = document.getElementById(s);
            if (s === id) { el.style.display = 'block'; el.classList.add('active'); }
            else          { el.style.display = 'none';  el.classList.remove('active'); }
        });
    }

    function goBack() { show('s-main'); }

    /* ── option select ── */
    function selectOpt(key, label, btn) {
        chosenKey   = key;
        chosenLabel = label;
        burst(btn);
        document.getElementById('time-choice').textContent = 'Выбор: ' + label;
        show('s-time');
    }

    function selectTired(btn) {
        burst(btn);
        const msg = `😴 Алина устала...\n\n📅 Увидимся завтра:\n• В 10:00 ☀️\n• В 20:00 🌙`;
        tg(msg);
        showSuccess('Хорошо, отдыхай! 💜\nУвидимся завтра в 10:00 или 20:00 🌙');
        launchConfetti();
    }

    /* ── time presets ── */
    function pickPreset(t, btn) {
        document.getElementById('time-input').value = t;
        document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    document.getElementById('time-input').addEventListener('input', () => {
        document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('selected'));
    });

    /* ── confirm time ── */
    function confirmTime() {
        const t = document.getElementById('time-input').value;
        if (!t) {
            const inp = document.getElementById('time-input');
            inp.style.borderColor = '#c2748a';
            setTimeout(() => inp.style.borderColor = '', 700);
            return;
        }
        const msg = `🌸 Алина ответила!\n\n🎯 Куда идём: ${chosenLabel}\n🕐 Время: ${t}`;
        tg(msg);
        showSuccess(`${chosenLabel} в ${t}!\nБуду ждать тебя 💜`);
        launchConfetti();
    }

    /* ── success ── */
    function showSuccess(text) {
        document.getElementById('success-msg').textContent = text;
        show('s-success');
    }

    /* ── telegram ── */
    async function tg(text) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text })
            });
        } catch(e) { console.warn('TG:', e); }
    }

    /* ── fleeing button ── */
    const noBtn = document.getElementById('no-btn');
    let fleeing = false;
    noBtn.style.left   = (window.innerWidth  - noBtn.offsetWidth  - 18) + 'px';
    noBtn.style.top    = (window.innerHeight - noBtn.offsetHeight - 18) + 'px';
    noBtn.style.right  = 'auto';
    noBtn.style.bottom = 'auto';

    function flee() {
        if (fleeing) return;
        fleeing = true;
        const vw = window.innerWidth, vh = window.innerHeight;
        const bw = noBtn.offsetWidth + 10, bh = noBtn.offsetHeight + 10;
        noBtn.style.left = Math.random() * (vw - bw) + 'px';
        noBtn.style.top  = Math.random() * (vh - bh) + 'px';
        setTimeout(() => fleeing = false, 320);
    }

    /* ── hearts burst ── */
    function burst(btn) {
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const icons = ['🌸','🌷','✨','💕','🌺','⭐','🪷'];
        for (let i = 0; i < 7; i++) {
            const h = document.createElement('div');
            h.className = 'heart-burst';
            h.textContent = icons[Math.floor(Math.random() * icons.length)];
            const angle = (Math.PI * 2 / 7) * i;
            const dist  = 50 + Math.random() * 35;
            h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            h.style.setProperty('--dy', Math.sin(angle) * dist - 20 + 'px');
            h.style.setProperty('--dr', (Math.random() * 120 - 60) + 'deg');
            h.style.left = cx + 'px';
            h.style.top  = cy + 'px';
            h.style.animationDelay = i * 0.06 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1300);
        }
    }

    /* ── cursor sparkles ── */
    let sparkCooldown = false;
    document.addEventListener('mousemove', (e) => {
        if (sparkCooldown || Math.random() > .1) return;
        sparkCooldown = true;
        setTimeout(() => sparkCooldown = false, 90);
        const sparks = ['✨','💫','🌸','⭐'];
        const s = document.createElement('div');
        s.className = 'cursor-spark';
        s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
        s.style.left = e.clientX + 'px';
        s.style.top  = e.clientY + 'px';
        s.style.setProperty('--dx', (Math.random() * 30 - 15) + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 850);
    });

    /* ── confetti ── */
    function launchConfetti() {
        const colors = ['#f48fb1','#c2748a','#e8d0dc','#d4a0b0','#f9d0dd','#dbb5c0'];
        for (let i = 0; i < 70; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.left   = Math.random() * 100 + 'vw';
            c.style.top    = '-10px';
            const dur = 2.5 + Math.random() * 2;
            c.style.animationDuration = dur + 's';
            c.style.animationDelay    = Math.random() * .8 + 's';
            c.style.borderRadius      = Math.random() > .5 ? '50%' : '2px';
            c.style.width  = (5 + Math.random() * 6) + 'px';
            c.style.height = (5 + Math.random() * 6) + 'px';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), (dur + 1) * 1000);
        }
    }

    /* ── falling petals ── */
    const petalSet = ['🌸','🌷','🌺','🌼','🪷'];
    function spawnPetal() {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = petalSet[Math.floor(Math.random() * petalSet.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = (9 + Math.random() * 12) + 'px';
        const dur = 7 + Math.random() * 8;
        p.style.animationDuration = dur + 's';
        p.style.animationDelay    = Math.random() * 2 + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), (dur + 2.5) * 1000);
    }
    for (let i = 0; i < 10; i++) setTimeout(spawnPetal, i * 180);
    setInterval(spawnPetal, 750);

    show('s-main');
</script>
</body>
</html>
