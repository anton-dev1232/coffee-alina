<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Алина, привет! 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink: #f48fb1;
            --purple: #ba68c8;
            --deep-purple: #8B4CA8;
            --light-purple: #e8d5f5;
            --text-purple: #6a3483;
            --soft: #b06fc5;
        }

        body {
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 20%, #ede7f6 50%, #e1bee7 75%, #ce93d8 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* === PETALS === */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: fall linear forwards;
            will-change: transform;
        }
        @keyframes fall {
            0%   { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 0.9; }
            80%  { opacity: 0.7; }
            100% { transform: translateY(105vh) rotate(540deg) scale(0.8); opacity: 0; }
        }

        /* === CURSOR SPARKLE === */
        .cursor-spark {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            font-size: 1rem;
            animation: sparkFly 0.8s ease-out forwards;
        }
        @keyframes sparkFly {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            60%  { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--dx)), calc(-50% - 50px)) scale(1.2); opacity: 0; }
        }

        /* === HEART BURST === */
        .heart-burst {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.4rem;
            animation: heartFly 1.1s ease-out forwards;
        }
        @keyframes heartFly {
            0%   { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            50%  { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1) rotate(var(--dr)); opacity: 0; }
        }

        /* === CONFETTI === */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* === LAYOUT === */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 16px 80px;
        }

        .card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 44px 32px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow:
                0 8px 32px rgba(186,104,200,0.18),
                0 2px 8px rgba(186,104,200,0.10),
                inset 0 1px 0 rgba(255,255,255,0.9);
            position: relative;
        }

        .card-flowers {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.4rem;
            letter-spacing: 4px;
            white-space: nowrap;
            filter: drop-shadow(0 2px 6px rgba(186,104,200,0.4));
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--deep-purple);
            text-align: center;
            margin-top: 10px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            color: var(--soft);
            font-size: 0.97rem;
            margin-bottom: 28px;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        .question {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--text-purple);
            text-align: center;
            margin-bottom: 22px;
            line-height: 1.55;
        }

        /* === OPTION BUTTONS === */
        .options { display: flex; flex-direction: column; gap: 11px; }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .option-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .option-btn:hover::after { background: rgba(255,255,255,0.12); }
        .option-btn:hover  { transform: translateY(-3px) scale(1.015); }
        .option-btn:active { transform: scale(0.97); }

        .option-btn .ico { font-size: 1.5rem; flex-shrink: 0; }

        .opt-1 { background: linear-gradient(135deg, #f06292, #e91e8c); box-shadow: 0 4px 18px rgba(240,98,146,.4); }
        .opt-2 { background: linear-gradient(135deg, #ab47bc, #7b1fa2); box-shadow: 0 4px 18px rgba(171,71,188,.4); }
        .opt-3 { background: linear-gradient(135deg, #26c6da, #0097a7); box-shadow: 0 4px 18px rgba(38,198,218,.4); }
        .opt-4 { background: linear-gradient(135deg, #ef5350, #c62828); box-shadow: 0 4px 18px rgba(239,83,80,.4); }
        .opt-5 { background: linear-gradient(135deg, #ffa726, #e65100); box-shadow: 0 4px 18px rgba(255,167,38,.4); }
        .opt-6 { background: linear-gradient(135deg, #90a4ae, #546e7a); box-shadow: 0 4px 18px rgba(144,164,174,.35); font-size:0.9rem; }

        /* === SECTIONS === */
        .section { display: none; animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) both; }
        .section.active { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--deep-purple);
            text-align: center;
            margin-bottom: 6px;
        }
        .section-sub {
            text-align: center;
            color: var(--soft);
            font-size: 0.92rem;
            margin-bottom: 22px;
        }

        /* === TIME SECTION === */
        .time-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .time-preset {
            background: rgba(186,104,200,.12);
            border: 2px solid rgba(186,104,200,.4);
            color: var(--text-purple);
            border-radius: 10px;
            padding: 7px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-preset:hover,
        .time-preset.selected { background: var(--purple); border-color: var(--purple); color: #fff; }

        .time-input-wrap { position: relative; margin-bottom: 22px; }
        .time-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(186,104,200,.35);
            border-radius: 16px;
            font-size: 1.6rem;
            text-align: center;
            color: var(--deep-purple);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            outline: none;
            background: rgba(255,255,255,.85);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .time-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 4px rgba(186,104,200,.18);
        }

        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--deep-purple), var(--purple));
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(139,76,168,.4);
            letter-spacing: 0.3px;
        }
        .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,76,168,.5); }
        .confirm-btn:active { transform: scale(.98); }

        /* === TOMORROW SECTION === */
        .tomorrow-emoji { font-size: 3.5rem; text-align: center; margin-bottom: 14px; }
        .tomorrow-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .tomorrow-btn {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 15px 28px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(186,104,200,.35);
        }
        .tomorrow-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(186,104,200,.55); }

        /* === SUCCESS SECTION === */
        .success-big { font-size: 4rem; text-align: center; margin-bottom: 16px; }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--deep-purple);
            text-align: center;
            margin-bottom: 10px;
        }
        .success-text { color: var(--soft); text-align: center; font-size: 1rem; line-height: 1.55; }
        .success-flowers {
            text-align: center;
            font-size: 2rem;
            margin-top: 20px;
            animation: sway 2.5s ease-in-out infinite;
        }

        /* === BACK BUTTON === */
        .back-btn {
            background: none;
            border: none;
            color: var(--soft);
            font-size: 0.88rem;
            cursor: pointer;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--deep-purple); }

        /* === DECO FLOWERS === */
        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 2.2rem;
            opacity: 0.22;
            animation: sway ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-12deg) scale(1); }
            50%       { transform: rotate(12deg) scale(1.05); }
        }

        /* === FLEEING BUTTON === */
        .no-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: rgba(210,210,220,.55);
            color: #aaa;
            border: 1px solid rgba(190,190,200,.5);
            border-radius: 10px;
            padding: 7px 13px;
            font-size: 0.78rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: default;
            backdrop-filter: blur(6px);
            z-index: 2000;
            user-select: none;
            transition: left 0.25s cubic-bezier(.22,.68,0,1.4), top 0.25s cubic-bezier(.22,.68,0,1.4);
        }

        /* === MOBILE === */
        @media (max-width: 480px) {
            .card { padding: 40px 18px 28px; border-radius: 26px; }
            .card h1 { font-size: 1.65rem; }
            .question { font-size: 1.1rem; }
            .option-btn { padding: 12px 14px; font-size: 0.9rem; }
            .option-btn .ico { font-size: 1.3rem; }
            .time-input { font-size: 1.3rem; }
            .section-title { font-size: 1.2rem; }
            .success-title { font-size: 1.35rem; }
        }
    </style>
</head>
<body>

<!-- Corner decoration flowers -->
<div class="deco" style="top:4%;  left:2%;  animation-duration:4s">🌸</div>
<div class="deco" style="top:4%;  right:2%; animation-duration:5s; animation-delay:.8s">🌺</div>
<div class="deco" style="bottom:8%; left:2%; animation-duration:3.5s; animation-delay:1.5s">🌷</div>
<div class="deco" style="bottom:8%; right:2%; animation-duration:4.5s; animation-delay:.3s">🌸</div>
<div class="deco" style="top:42%; left:0%; animation-duration:6s; animation-delay:2s; font-size:1.6rem">🌼</div>
<div class="deco" style="top:42%; right:0%; animation-duration:5.5s; animation-delay:1s; font-size:1.6rem">🌼</div>
<div class="deco" style="top:20%; left:5%; animation-duration:7s; animation-delay:.5s; font-size:1.3rem">🪷</div>
<div class="deco" style="top:20%; right:5%; animation-duration:6.5s; animation-delay:2.5s; font-size:1.3rem">🪷</div>

<div class="container">
    <div class="card">
        <div class="card-flowers">🌸🌺🌸</div>

        <!-- ======= MAIN ======= -->
        <div id="s-main">
            <h1>Привет, Алина! 💜</h1>
            <p class="subtitle">У меня есть одна идея на сегодня...</p>
            <p class="question">✨ Куда пойдём? ✨</p>

            <div class="options">
                <button class="option-btn opt-1" onclick="selectOpt('billiards','🎱 Бильярд', this)">
                    <span class="ico">🎱</span><span>Бильярд</span>
                </button>
                <button class="option-btn opt-2" onclick="selectOpt('walk','🌿 Вайбово погулять', this)">
                    <span class="ico">🌿</span><span>Вайбово погулять</span>
                </button>
                <button class="option-btn opt-3" onclick="selectOpt('bay','🌊 Посмотреть на залив под безкалорийный лимонадик', this)">
                    <span class="ico">🌊</span><span>Посмотреть на залив под безкалорийный лимонадик</span>
                </button>
                <button class="option-btn opt-4" onclick="selectOpt('cinema','🎬 Кинотеатр', this)">
                    <span class="ico">🎬</span><span>Кинотеатр</span>
                </button>
                <button class="option-btn opt-5" onclick="selectOpt('food','🍰 Сходить покушать чего-нибудь вкусненького', this)">
                    <span class="ico">🍰</span><span>Сходить покушать чего-нибудь вкусненького</span>
                </button>
                <button class="option-btn opt-6" onclick="selectTired(this)">
                    <span class="ico">😴</span><span>Я устала...</span>
                </button>
            </div>
        </div>

        <!-- ======= TIME PICKER ======= -->
        <div id="s-time" class="section">
            <div class="section-title" id="time-heading">Отлично! Во сколько? 🕐</div>
            <div class="section-sub" id="time-choice"></div>

            <div class="time-presets" id="time-presets">
                <button class="time-preset" onclick="pickPreset('15:00',this)">15:00</button>
                <button class="time-preset" onclick="pickPreset('16:00',this)">16:00</button>
                <button class="time-preset" onclick="pickPreset('17:00',this)">17:00</button>
                <button class="time-preset" onclick="pickPreset('18:00',this)">18:00</button>
                <button class="time-preset" onclick="pickPreset('19:00',this)">19:00</button>
                <button class="time-preset" onclick="pickPreset('20:00',this)">20:00</button>
                <button class="time-preset" onclick="pickPreset('21:00',this)">21:00</button>
            </div>

            <div class="time-input-wrap">
                <input type="time" class="time-input" id="time-input" value="18:00">
            </div>

            <button class="confirm-btn" onclick="confirmTime()">Готово! ✨</button>
            <button class="back-btn" onclick="goBack()">← Назад</button>
        </div>

        <!-- ======= TOMORROW ======= -->
        <div id="s-tired" class="section">
            <div class="tomorrow-emoji">😴💤🌙</div>
            <div class="section-title">Тогда завтра? 🌙</div>
            <div class="section-sub">Выбери удобное время:</div>
            <div class="tomorrow-btns">
                <button class="tomorrow-btn" onclick="confirmTomorrow('10:00', this)">☀️ В 10:00</button>
                <button class="tomorrow-btn" onclick="confirmTomorrow('20:00', this)">🌙 В 20:00</button>
            </div>
            <button class="back-btn" style="margin:16px auto 0;justify-content:center" onclick="goBack()">← Назад</button>
        </div>

        <!-- ======= SUCCESS ======= -->
        <div id="s-success" class="section">
            <div class="success-big">🎉</div>
            <div class="success-title">Ура! Договорились! 💜</div>
            <p class="success-text" id="success-msg"></p>
            <div class="success-flowers">🌸💜🌺💜🌸</div>
        </div>
    </div>
</div>

<!-- Fleeing "не видимся" button -->
<button class="no-btn" id="no-btn" onmouseenter="flee()" ontouchstart="flee()">
    не видимся
</button>

<script>
    const BOT_TOKEN = '8778337128:AAGSoODfDasVMV1i87jUf36P9fJHprCy3lc';
    const CHAT_ID   = '1160362290';

    let chosenKey   = '';
    let chosenLabel = '';

    /* ── sections ── */
    function show(id) {
        ['s-main','s-time','s-tired','s-success'].forEach(s => {
            const el = document.getElementById(s);
            if (s === id) { el.style.display = 'block'; el.classList.add('active'); }
            else          { el.style.display = 'none';  el.classList.remove('active'); }
        });
    }

    function goBack() { show('s-main'); }

    /* ── option select ── */
    function selectOpt(key, label, btn) {
        chosenKey   = key;
        chosenLabel = label;
        burst(btn);
        document.getElementById('time-choice').textContent = 'Выбор: ' + label;
        show('s-time');
    }

    function selectTired(btn) {
        burst(btn);
        show('s-tired');
    }

    /* ── time presets ── */
    function pickPreset(t, btn) {
        document.getElementById('time-input').value = t;
        document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    document.getElementById('time-input').addEventListener('input', () => {
        document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('selected'));
    });

    /* ── confirm time ── */
    function confirmTime() {
        const t = document.getElementById('time-input').value;
        if (!t) { shakeInput(); return; }
        const msg = `🌸 *Алина ответила!*\n\n🎯 Куда идём: ${chosenLabel}\n🕐 Время: ${t}\n\n✨ Ждёт тебя!`;
        tg(msg);
        showSuccess(`${chosenLabel} в ${t}! Буду ждать тебя! 💜`);
        launchConfetti();
    }

    function shakeInput() {
        const inp = document.getElementById('time-input');
        inp.style.animation = 'none';
        inp.offsetWidth;
        inp.style.borderColor = '#e91e8c';
        setTimeout(() => inp.style.borderColor = '', 700);
    }

    /* ── tomorrow ── */
    function confirmTomorrow(time, btn) {
        burst(btn);
        const msg = `💤 *Алина устала...*\n\n📅 Встречаемся завтра в ${time}\n\n🌙 До завтра!`;
        tg(msg);
        showSuccess(`Хорошо, отдыхай 💜\nТогда встретимся завтра в ${time}!`);
        launchConfetti();
    }

    /* ── success ── */
    function showSuccess(text) {
        document.getElementById('success-msg').textContent = text;
        show('s-success');
    }

    /* ── telegram ── */
    async function tg(text) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'Markdown' })
            });
        } catch(e) { console.warn('TG:', e); }
    }

    /* ── fleeing button ── */
    const noBtn = document.getElementById('no-btn');
    let fleeing = false;
    noBtn.style.left = (window.innerWidth  - noBtn.offsetWidth  - 18) + 'px';
    noBtn.style.top  = (window.innerHeight - noBtn.offsetHeight - 18) + 'px';
    noBtn.style.right  = 'auto';
    noBtn.style.bottom = 'auto';

    function flee() {
        if (fleeing) return;
        fleeing = true;
        const vw = window.innerWidth, vh = window.innerHeight;
        const bw = noBtn.offsetWidth  + 10, bh = noBtn.offsetHeight + 10;
        const newX = Math.random() * (vw - bw);
        const newY = Math.random() * (vh - bh);
        noBtn.style.left = newX + 'px';
        noBtn.style.top  = newY + 'px';
        setTimeout(() => fleeing = false, 300);
    }

    /* ── hearts burst on button click ── */
    function burst(btn) {
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width  / 2;
        const cy = rect.top  + rect.height / 2;
        const icons = ['💜','🌸','✨','💕','🌺','⭐','🎀'];
        for (let i = 0; i < 7; i++) {
            const h = document.createElement('div');
            h.className = 'heart-burst';
            h.textContent = icons[Math.floor(Math.random() * icons.length)];
            const angle = (Math.PI * 2 / 7) * i;
            const dist  = 55 + Math.random() * 35;
            h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            h.style.setProperty('--dy', Math.sin(angle) * dist - 20 + 'px');
            h.style.setProperty('--dr', (Math.random() * 120 - 60) + 'deg');
            h.style.left = cx + 'px';
            h.style.top  = cy + 'px';
            h.style.animationDelay = i * 0.06 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1300);
        }
    }

    /* ── cursor sparkles ── */
    let sparkCooldown = false;
    document.addEventListener('mousemove', (e) => {
        if (sparkCooldown) return;
        if (Math.random() > 0.12) return;
        sparkCooldown = true;
        setTimeout(() => sparkCooldown = false, 80);
        const sparks = ['✨','💫','⭐','🌟','💜'];
        const s = document.createElement('div');
        s.className = 'cursor-spark';
        s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
        s.style.left = e.clientX + 'px';
        s.style.top  = e.clientY + 'px';
        s.style.setProperty('--dx', (Math.random() * 40 - 20) + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
    });

    /* ── confetti ── */
    function launchConfetti() {
        const colors = ['#f48fb1','#ce93d8','#80cbc4','#fff176','#ef9a9a','#c5e1a5'];
        for (let i = 0; i < 80; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top  = '-10px';
            const dur = 2.5 + Math.random() * 2;
            c.style.animationDuration = dur + 's';
            c.style.animationDelay = Math.random() * 0.8 + 's';
            c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
            c.style.width  = (6 + Math.random() * 6) + 'px';
            c.style.height = (6 + Math.random() * 6) + 'px';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), (dur + 1) * 1000);
        }
    }

    /* ── falling petals ── */
    const petalSet = ['🌸','🌺','🌷','🌼','💮','🪷','🌹'];
    function spawnPetal() {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = petalSet[Math.floor(Math.random() * petalSet.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = (10 + Math.random() * 14) + 'px';
        const dur = 7 + Math.random() * 8;
        p.style.animationDuration = dur + 's';
        p.style.animationDelay    = Math.random() * 2 + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), (dur + 2.5) * 1000);
    }
    for (let i = 0; i < 10; i++) setTimeout(spawnPetal, i * 180);
    setInterval(spawnPetal, 700);

    /* ── init: show main ── */
    show('s-main');
</script>
</body>
</html>
