<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Умная блондинка</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #f4efe9;
            --surface:   #ffffff;
            --rose:      #c08070;
            --rose-dark: #9e6050;
            --rose-xl:   rgba(192,128,112,0.09);
            --sage:      #8da08a;
            --text:      #28201a;
            --text-mid:  #5c4a40;
            --text-muted:#a09088;
            --border:    rgba(192,128,112,0.2);
            --r:         14px;
            --shadow:    0 4px 28px rgba(40,32,26,0.09);
            --shadow-sm: 0 2px 12px rgba(40,32,26,0.06);
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Screens ── */
        .screen { display: none; min-height: 100dvh; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }

        /* ═══════════════════════════════════
           SCREEN 1 · Question
        ═══════════════════════════════════ */
        #s1 {
            align-items: center;
            justify-content: center;
            padding: 48px 24px 96px;
            position: relative;
        }

        .s1-inner {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        /* Botanical SVG ornament */
        .floral-ornament {
            width: 180px;
            height: 54px;
            display: block;
            margin: 0 auto 36px;
        }

        .site-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.1rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }

        .site-sub {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 56px;
        }

        .big-q {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            font-weight: 300;
            line-height: 1.45;
            color: var(--text-mid);
            margin-bottom: 48px;
        }

        .btn-yes {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--rose);
            color: #fff;
            border: none;
            border-radius: 100px;
            padding: 15px 44px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 22px rgba(192,128,112,0.35);
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-yes:hover {
            background: var(--rose-dark);
            transform: translateY(-2px);
            box-shadow: 0 7px 30px rgba(192,128,112,0.45);
        }
        .btn-yes:active { transform: scale(0.97); }

        /* Fleeing No */
        #btn-no {
            position: fixed;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 11px 26px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            cursor: default;
            user-select: none;
            z-index: 9999;
            white-space: nowrap;
            display: none;
            -webkit-tap-highlight-color: transparent;
            transition:
                left  0.28s cubic-bezier(0.22,0.68,0,1.4),
                top   0.28s cubic-bezier(0.22,0.68,0,1.4);
        }

        /* ═══════════════════════════════════
           SCREEN 2 · Map
        ═══════════════════════════════════ */
        #s2 { height: 100dvh; height: 100vh; }

        .screen-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            position: relative;
            z-index: 600;
        }

        .back-btn {
            width: 34px; height: 34px;
            border: none;
            background: var(--rose-xl);
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--rose);
            font-size: 1.1rem;
            transition: background 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:hover { background: rgba(192,128,112,0.18); }

        .screen-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text);
        }

        #map {
            flex: 1;
            min-height: 0;
        }

        /* Leaflet overrides */
        .leaflet-popup-content-wrapper {
            border-radius: 14px !important;
            box-shadow: var(--shadow) !important;
            border: none !important;
            padding: 0 !important;
        }
        .leaflet-popup-content {
            margin: 16px 18px 14px !important;
        }
        .leaflet-popup-tip-container { opacity: 0.7; }
        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 18px !important;
            top: 8px !important; right: 10px !important;
        }
        .pop-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .pop-desc { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 2px; }
        .pop-check { font-size: 0.8rem; color: var(--sage); font-weight: 500; margin-bottom: 12px; }
        .pop-btn {
            background: var(--rose);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .pop-btn:hover { background: var(--rose-dark); }

        .map-bottom {
            flex-shrink: 0;
            background: var(--surface);
            padding: 18px 20px 24px;
            box-shadow: 0 -4px 24px rgba(40,32,26,0.08);
        }

        .selected-place {
            display: none;
            background: var(--rose-xl);
            border: 1px solid rgba(192,128,112,0.22);
            border-radius: var(--r);
            padding: 12px 16px;
            margin-bottom: 14px;
        }
        .selected-place.show { display: block; }
        .sp-name { font-weight: 500; font-size: 0.92rem; color: var(--rose-dark); margin-bottom: 2px; }
        .sp-meta { font-size: 0.78rem; color: var(--text-muted); }

        .or-line {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.78rem; color: var(--text-muted);
            margin-bottom: 12px;
        }
        .or-line::before, .or-line::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .place-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }
        .place-input:focus { border-color: var(--rose); }
        .place-input::placeholder { color: var(--text-muted); }

        .btn-next {
            width: 100%;
            background: var(--rose);
            color: #fff;
            border: none;
            border-radius: var(--r);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: background 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-next:hover { background: var(--rose-dark); transform: translateY(-1px); }
        .btn-next:disabled {
            background: rgba(192,128,112,0.3);
            cursor: not-allowed;
            transform: none;
        }

        /* ═══════════════════════════════════
           SCREEN 3 · Date & Time
        ═══════════════════════════════════ */
        #s3 { background: var(--bg); }

        .s3-body {
            flex: 1;
            padding: 28px 20px 44px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .place-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--rose-xl);
            border: 1px solid rgba(192,128,112,0.22);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: var(--rose-dark);
            font-weight: 500;
            margin-bottom: 30px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .field-label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }

        .date-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .date-card:hover { border-color: var(--rose); transform: translateY(-1px); }
        .date-card.sel {
            border-color: var(--rose);
            background: var(--rose-xl);
        }
        .dc-day {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .dc-num {
            font-size: 1.8rem;
            font-weight: 500;
            line-height: 1;
            color: var(--text);
            margin-bottom: 4px;
        }
        .dc-mon { font-size: 0.75rem; color: var(--text-muted); }
        .date-card.sel .dc-day { color: var(--rose-dark); }
        .date-card.sel .dc-num { color: var(--rose-dark); }

        .time-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .time-chip {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 7px 13px;
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .time-chip:hover, .time-chip.sel {
            background: var(--rose);
            border-color: var(--rose);
            color: #fff;
        }

        .time-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text);
            background: var(--surface);
            outline: none;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
            margin-bottom: 28px;
        }
        .time-input:focus { border-color: var(--rose); }

        .error-hint {
            font-size: 0.78rem;
            color: #c06060;
            margin-top: -20px;
            margin-bottom: 16px;
            display: none;
        }
        .error-hint.show { display: block; }

        .btn-confirm {
            width: 100%;
            background: var(--rose);
            color: #fff;
            border: none;
            border-radius: var(--r);
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(192,128,112,0.3);
            transition: background 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-confirm:hover { background: var(--rose-dark); transform: translateY(-1px); }
        .btn-confirm:active { transform: scale(0.98); }

        /* ═══════════════════════════════════
           SCREEN 4 · Success
        ═══════════════════════════════════ */
        #s4 {
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .s4-inner {
            max-width: 340px;
            width: 100%;
            text-align: center;
        }

        @keyframes popIn {
            from { transform: scale(0) rotate(-12deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }
        .s4-icon {
            font-size: 3.6rem;
            margin-bottom: 22px;
            display: block;
            animation: popIn 0.55s cubic-bezier(0.22,1.5,0.36,1) both;
        }

        .s4-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text);
            margin-bottom: 10px;
        }

        .s4-sub {
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .s4-card {
            background: var(--surface);
            border-radius: var(--r);
            padding: 20px 22px;
            text-align: left;
            box-shadow: var(--shadow-sm);
        }
        .s4-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            font-size: 0.88rem;
            color: var(--text-mid);
        }
        .s4-row + .s4-row { border-top: 1px solid rgba(40,32,26,0.06); }
        .s4-lbl {
            color: var(--text-muted);
            font-size: 0.75rem;
            width: 60px;
            flex-shrink: 0;
            padding-top: 1px;
        }

        /* Confetti */
        .confetti-p {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: cfall linear forwards;
        }
        @keyframes cfall {
            from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            to   { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
        }

        /* Subtle petal decoration on s1 */
        .petal-deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            font-size: 11px;
            animation: petalDrift linear forwards;
        }
        @keyframes petalDrift {
            0%   { opacity: 0;   transform: translateY(-20px) rotate(0deg)   translateX(0); }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.3; }
            100% { opacity: 0;   transform: translateY(105vh) rotate(400deg) translateX(20px); }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .site-name { font-size: 1.75rem; }
            .big-q { font-size: 1.4rem; }
            .s4-title { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SCREEN 1 · Вопрос о свидании
══════════════════════════════════════════ -->
<div id="s1" class="screen active">
    <div class="s1-inner fade-up">

        <!-- Botanical ornament -->
        <svg class="floral-ornament" viewBox="0 0 180 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- connector lines -->
            <path d="M8 27 Q30 22 52 27" stroke="#c08070" stroke-width="0.8" opacity="0.35"/>
            <path d="M128 27 Q150 32 172 27" stroke="#c08070" stroke-width="0.8" opacity="0.35"/>
            <path d="M76 27 Q90 22 104 27" stroke="#c08070" stroke-width="0.8" opacity="0.3"/>
            <!-- left small flower -->
            <g transform="translate(36,27)">
                <circle cx="0" cy="-9" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="0" cy="9"  r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="-9" cy="0" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="9"  cy="0" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="-6" cy="-6" r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="6"  cy="-6" r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="-6" cy="6"  r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="6"  cy="6"  r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="0" cy="0" r="4" stroke="#c08070" stroke-width="0.9" opacity="0.4"/>
            </g>
            <!-- center flower -->
            <g transform="translate(90,27)">
                <circle cx="0"   cy="-12" r="4"   fill="#c08070" opacity="0.3"/>
                <circle cx="0"   cy="12"  r="4"   fill="#c08070" opacity="0.3"/>
                <circle cx="-12" cy="0"   r="4"   fill="#c08070" opacity="0.3"/>
                <circle cx="12"  cy="0"   r="4"   fill="#c08070" opacity="0.3"/>
                <circle cx="-8"  cy="-8"  r="3"   fill="#c08070" opacity="0.2"/>
                <circle cx="8"   cy="-8"  r="3"   fill="#c08070" opacity="0.2"/>
                <circle cx="-8"  cy="8"   r="3"   fill="#c08070" opacity="0.2"/>
                <circle cx="8"   cy="8"   r="3"   fill="#c08070" opacity="0.2"/>
                <circle cx="0" cy="0" r="5.5" stroke="#c08070" stroke-width="1" opacity="0.45"/>
                <circle cx="0" cy="0" r="2.5" fill="#c08070" opacity="0.25"/>
            </g>
            <!-- right small flower -->
            <g transform="translate(144,27)">
                <circle cx="0" cy="-9" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="0" cy="9"  r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="-9" cy="0" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="9"  cy="0" r="3" fill="#c08070" opacity="0.22"/>
                <circle cx="-6" cy="-6" r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="6"  cy="-6" r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="-6" cy="6"  r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="6"  cy="6"  r="2.5" fill="#c08070" opacity="0.15"/>
                <circle cx="0" cy="0" r="4" stroke="#c08070" stroke-width="0.9" opacity="0.4"/>
            </g>
        </svg>

        <h1 class="site-name">Умная блондинка</h1>
        <p class="site-sub">личное приглашение</p>

        <p class="big-q">Пойдёшь со мной<br>на свидание?</p>

        <button class="btn-yes" onclick="sayYes()">Да, с удовольствием</button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2 · Карта ресторанов
══════════════════════════════════════════ -->
<div id="s2" class="screen">
    <div class="screen-header">
        <button class="back-btn" onclick="goTo('s1')" aria-label="Назад">←</button>
        <span class="screen-title">Выбери ресторан</span>
    </div>
    <div id="map"></div>
    <div class="map-bottom">
        <div class="selected-place" id="sel-place">
            <div class="sp-name" id="sel-name"></div>
            <div class="sp-meta" id="sel-meta"></div>
        </div>
        <div class="or-line">или напиши название</div>
        <input type="text" class="place-input" id="place-input"
               placeholder="Название ресторана..."
               oninput="onPlaceText(this.value)">
        <button class="btn-next" id="btn-next" disabled onclick="goToDateTime()">
            Выбрать дату и время →
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3 · Дата и время
══════════════════════════════════════════ -->
<div id="s3" class="screen">
    <div class="screen-header">
        <button class="back-btn" onclick="goTo('s2')" aria-label="Назад">←</button>
        <span class="screen-title">Дата и время</span>
    </div>
    <div class="s3-body">
        <div class="place-tag">📍 <span id="s3-place"></span></div>

        <div class="field-label">Выбери день</div>
        <div class="date-grid" id="date-grid"></div>

        <div class="field-label">Выбери время</div>
        <div class="time-chips" id="time-chips"></div>
        <input type="time" class="time-input" id="time-input"
               min="11:00" max="23:00" value="19:00"
               oninput="onTimeManual()">
        <div class="error-hint" id="time-error">Выбери время с 11:00 до 23:00</div>

        <button class="btn-confirm" onclick="submitChoice()">
            Отправить ✦
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 4 · Готово!
══════════════════════════════════════════ -->
<div id="s4" class="screen">
    <div class="s4-inner fade-up">
        <span class="s4-icon">🌸</span>
        <h2 class="s4-title">Отлично!</h2>
        <p class="s4-sub">Жду тебя с нетерпением&nbsp;🤍</p>
        <div class="s4-card">
            <div class="s4-row">
                <span class="s4-lbl">Место</span>
                <span id="s4-place"></span>
            </div>
            <div class="s4-row">
                <span class="s4-lbl">Дата</span>
                <span id="s4-date"></span>
            </div>
            <div class="s4-row">
                <span class="s4-lbl">Время</span>
                <span id="s4-time"></span>
            </div>
        </div>
    </div>
</div>

<!-- Убегающая кнопка «Нет» -->
<button id="btn-no"
        onmouseenter="fleeNo()"
        ontouchstart="fleeNo()"
        onclick="return false">
    Нет
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── Config ── */
const BOT_TOKEN = '8778337128:AAGSoODfDasVMV1i87jUf36P9fJHprCy3lc';
const CHAT_ID   = '1160362290';

/* ── Restaurants ── */
const PLACES = [
    { name:'Корюшка',        desc:'На воде · вид на Неву и Петропавловскую крепость',    lat:59.9501, lng:30.3193 },
    { name:'Гребешки',       desc:'Арсенальная набережная · панорамный вид на Неву',     lat:59.9540, lng:30.3617 },
    { name:'Этаж 41',        desc:'41-й этаж · самый высокий ресторан Северной Европы',  lat:59.8488, lng:30.3177 },
    { name:'Karl & Friedrich', desc:'Крестовский остров · пивоварня с видом на воду',    lat:59.9720, lng:30.2540 },
    { name:'SunDay Ginza',   desc:'Крестовский остров · терраса с видом на Финский залив', lat:59.9706, lng:30.2430 },
    { name:'Волна',          desc:'Парк 300-летия · вид на Финский залив',               lat:59.9805, lng:30.2048 },
    { name:'Porto Maltese',  desc:'Итальянская улица · морской ресторан в центре',       lat:59.9396, lng:30.3310 },
];

const TIME_CHIPS = ['11:00','13:00','15:00','17:00','19:00','21:00','23:00'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

/* ── State ── */
let chosenPlace    = '';
let mapChosenPlace = '';
let chosenDate     = null; // { label, dateObj }
let chosenTime     = '19:00';
let mapReady       = false;
let lmap;

/* ══ Navigation ══════════════════════════════ */
function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if (id === 's1') positionNoBtn();
    else document.getElementById('btn-no').style.display = 'none';

    if (id === 's2') {
        if (!mapReady) { setTimeout(initMap, 60); }
        else           { setTimeout(() => lmap.invalidateSize(), 100); }
    }
}

function sayYes() { goTo('s2'); }

/* ══ Fleeing NO button ═══════════════════════ */
let fleeing = false;
const noBtn = document.getElementById('btn-no');

function positionNoBtn() {
    const bh = 44;
    noBtn.style.display = 'block';
    noBtn.style.left = (window.innerWidth / 2 + 20) + 'px';
    noBtn.style.top  = (window.innerHeight - bh - 40) + 'px';
}

function fleeNo() {
    if (fleeing) return;
    fleeing = true;
    const bw = noBtn.offsetWidth  + 16;
    const bh = noBtn.offsetHeight + 16;
    noBtn.style.left = Math.max(0, Math.random() * (window.innerWidth  - bw)) + 'px';
    noBtn.style.top  = Math.max(0, Math.random() * (window.innerHeight - bh)) + 'px';
    setTimeout(() => fleeing = false, 330);
}

window.addEventListener('load', positionNoBtn);
window.addEventListener('resize', () => { if (noBtn.style.display === 'block') positionNoBtn(); });

/* ══ Map ═════════════════════════════════════ */
function initMap() {
    mapReady = true;
    lmap = L.map('map', { center:[59.944,30.316], zoom:12, attributionControl:false });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 19
    }).addTo(lmap);

    PLACES.forEach((p, i) => {
        const icon = L.divIcon({
            className: '',
            html: `<div style="width:22px;height:22px;background:#c08070;border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.18);"></div>`,
            iconSize: [22,22], iconAnchor:[8,22], popupAnchor:[3,-18]
        });
        L.marker([p.lat, p.lng], { icon }).addTo(lmap)
         .bindPopup(`
            <div class="pop-name">${p.name}</div>
            <div class="pop-desc">${p.desc}</div>
            <button class="pop-btn" onclick="pickPlace(${i})">Выбрать →</button>
         `);
    });
}

function pickPlace(i) {
    const p = PLACES[i];
    chosenPlace = mapChosenPlace = p.name;
    document.getElementById('sel-name').textContent = p.name;
    document.getElementById('sel-meta').textContent = p.desc;
    document.getElementById('sel-place').classList.add('show');
    document.getElementById('place-input').value = '';
    document.getElementById('btn-next').disabled = false;
    lmap.closePopup();
}

function onPlaceText(val) {
    if (val.trim()) {
        chosenPlace = val.trim();
        document.getElementById('sel-place').classList.remove('show');
        document.getElementById('btn-next').disabled = false;
    } else if (mapChosenPlace) {
        chosenPlace = mapChosenPlace;
        document.getElementById('sel-place').classList.add('show');
        document.getElementById('btn-next').disabled = false;
    } else {
        chosenPlace = '';
        document.getElementById('btn-next').disabled = true;
    }
}

/* ══ Date & Time screen ══════════════════════ */
function getWeekend() {
    const today = new Date();
    const day   = today.getDay(); // 0=Sun … 6=Sat
    const toSat = ((6 - day + 7) % 7) || 7;
    const toSun = ((0 - day + 7) % 7) || 7;
    const sat = new Date(today); sat.setDate(today.getDate() + toSat);
    const sun = new Date(today); sun.setDate(today.getDate() + toSun);
    return [
        { label:'Суббота',      dateObj:sat },
        { label:'Воскресенье',  dateObj:sun },
    ];
}

function buildDateGrid() {
    const grid = document.getElementById('date-grid');
    grid.innerHTML = '';
    getWeekend().forEach((d, i) => {
        const el = document.createElement('div');
        el.className = 'date-card';
        const mo = d.dateObj.getMonth();
        el.innerHTML = `
            <div class="dc-day">${d.label}</div>
            <div class="dc-num">${d.dateObj.getDate()}</div>
            <div class="dc-mon">${MONTHS[mo]}</div>
        `;
        el.onclick = () => {
            document.querySelectorAll('.date-card').forEach(c => c.classList.remove('sel'));
            el.classList.add('sel');
            chosenDate = {
                label: d.label + ', ' + d.dateObj.getDate() + ' ' + MONTHS[mo],
                dateObj: d.dateObj
            };
        };
        grid.appendChild(el);
    });
}

function buildTimeChips() {
    const container = document.getElementById('time-chips');
    container.innerHTML = '';
    TIME_CHIPS.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'time-chip' + (t === '19:00' ? ' sel' : '');
        btn.textContent = t;
        btn.onclick = () => {
            document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('sel'));
            btn.classList.add('sel');
            document.getElementById('time-input').value = t;
            chosenTime = t;
            document.getElementById('time-error').classList.remove('show');
        };
        container.appendChild(btn);
    });
}

function onTimeManual() {
    const v = document.getElementById('time-input').value;
    chosenTime = v;
    document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('sel'));
    document.getElementById('time-error').classList.remove('show');
}

function goToDateTime() {
    document.getElementById('s3-place').textContent = chosenPlace;
    chosenDate = null;
    chosenTime = '19:00';
    document.getElementById('time-input').value = '19:00';
    document.getElementById('time-error').classList.remove('show');
    buildDateGrid();
    buildTimeChips();
    goTo('s3');
}

/* ══ Submit ══════════════════════════════════ */
async function submitChoice() {
    if (!chosenDate) {
        document.getElementById('date-grid').style.outline = '1.5px solid #c08070';
        setTimeout(() => document.getElementById('date-grid').style.outline = '', 700);
        return;
    }

    const timeVal = document.getElementById('time-input').value || chosenTime;
    if (!timeVal) return;

    const [h, m] = timeVal.split(':').map(Number);
    if (isNaN(h) || h < 11 || (h === 23 && m > 0) || h > 23) {
        document.getElementById('time-error').classList.add('show');
        return;
    }

    const msg = `🌸 Ответ получен!\n\n📍 Место: ${chosenPlace}\n📅 Дата: ${chosenDate.label}\n🕐 Время: ${timeVal}`;
    await sendTg(msg);

    document.getElementById('s4-place').textContent = chosenPlace;
    document.getElementById('s4-date').textContent  = chosenDate.label;
    document.getElementById('s4-time').textContent  = timeVal;

    confetti();
    goTo('s4');
}

/* ══ Telegram ════════════════════════════════ */
async function sendTg(text) {
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text })
        });
    } catch(e) { console.warn('TG error:', e); }
}

/* ══ Confetti ════════════════════════════════ */
function confetti() {
    const colors = ['#c08070','#d4a898','#8da08a','#c8b5a8','#e8d5cc','#f0e0d8'];
    for (let i = 0; i < 65; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-p';
        const s = 5 + Math.random() * 5;
        el.style.cssText = `
            background:${colors[~~(Math.random()*colors.length)]};
            left:${Math.random()*100}vw; top:-8px;
            width:${s}px; height:${s}px;
            border-radius:${Math.random()>.5?'50%':'3px'};
            animation-duration:${2.2+Math.random()*2}s;
            animation-delay:${Math.random()*.7}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }
}

/* ── Init ── */
positionNoBtn();
</script>
</body>
</html>
